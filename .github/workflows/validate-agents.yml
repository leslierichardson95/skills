name: custom-agent-validation

on:
  push:
    branches: [main]
    paths:
      - "src/**/agents/**"
      - ".github/workflows/validate-agents.yml"
  pull_request:
    paths:
      - "src/**/agents/**"
      - ".github/workflows/validate-agents.yml"

concurrency:
  group: validate-custom-agents-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft != true
    outputs:
      agents: ${{ steps.changed-agents.outputs.agents }}
      has_agents: ${{ steps.changed-agents.outputs.has_agents }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed agents
        id: changed-agents
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.event.after }}
          fi

          # Find added or changed .agent.md files in agents/ directory and extract agent directories
          AGENTS=$(git diff --name-only --diff-filter=ACMR $BASE $HEAD | \
            grep '^src/.*/agents/.*\.agent\.md$' | \
            xargs -I {} dirname {} | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "agents=$AGENTS" >> $GITHUB_OUTPUT

          if [ "$AGENTS" = "[]" ] || [ -z "$AGENTS" ]; then
            echo "has_agents=false" >> $GITHUB_OUTPUT
            echo "No agents changed"
          else
            echo "has_agents=true" >> $GITHUB_OUTPUT
            echo "Found agents: $AGENTS"
          fi

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_agents == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.detect-changes.outputs.agents) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate ${{ matrix.agent }}
        id: validate
        uses: timheuer/vscode-agent-validation@v0.1.0
        with:
          path: ${{ matrix.agent }}
          fail-on-warning: "true"
          validate-references: "true"

      - name: Save result
        if: always()
        run: |
          mkdir -p results
          AGENT_NAME=$(basename "${{ matrix.agent }}")
          VALID="${{ steps.validate.outputs.valid }}"
          ERRORS='${{ steps.validate.outputs.errors }}'
          WARNINGS='${{ steps.validate.outputs.warnings }}'

          # Create result file
          cat > "results/${AGENT_NAME}.json" << EOF
          {
            "agent": "$AGENT_NAME",
            "path": "${{ matrix.agent }}",
            "valid": $VALID,
            "errors": $ERRORS,
            "warnings": $WARNINGS
          }
          EOF

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ strategy.job-index }}
          path: results/
          retention-days: 1

  summary:
    needs: [detect-changes, validate]
    if: always() && needs.detect-changes.outputs.has_agents == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: results
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "## Custom Agent Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Agent | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          has_errors=false
          has_warnings=false

          for result_file in results/*.json; do
            if [ -f "$result_file" ]; then
              agent_name=$(jq -r '.agent' "$result_file")
              valid=$(jq -r '.valid' "$result_file")
              errors=$(jq -r '.errors | length' "$result_file")
              warnings=$(jq -r '.warnings | length' "$result_file")
              
              # Build details string
              details=""
              if [ "$errors" -gt 0 ]; then
                error_msgs=$(jq -r '.errors | map(.message // .) | join("; ")' "$result_file")
                details="$error_msgs"
              fi
              if [ "$warnings" -gt 0 ]; then
                warning_msgs=$(jq -r '.warnings | map(.message // .) | join("; ")' "$result_file")
                if [ -n "$details" ]; then
                  details="$details | Warnings: $warning_msgs"
                else
                  details="Warnings: $warning_msgs"
                fi
              fi
              
              # Determine status
              if [ "$valid" = "false" ]; then
                status="❌ Error"
                has_errors=true
                [ -z "$details" ] && details="Validation failed"
              elif [ "$warnings" -gt 0 ]; then
                status="⚠️ Warning"
                has_warnings=true
              else
                status="✅ Valid"
                details="All checks passed"
              fi
              
              echo "| \`$agent_name\` | $status | $details |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$has_errors" = true ]; then
            echo "### ❌ Validation failed" >> $GITHUB_STEP_SUMMARY
            echo "One or more agents have validation errors that must be fixed." >> $GITHUB_STEP_SUMMARY
          elif [ "$has_warnings" = true ]; then
            echo "### ⚠️ Validation passed with warnings" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ All agents validated successfully" >> $GITHUB_STEP_SUMMARY
          fi

  no-changes:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_agents != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report no agents changed
        run: |
          echo "## Custom Agent Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No agents were modified in this PR." >> $GITHUB_STEP_SUMMARY
